version: "3.8"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: microservices_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microservices_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservices-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 10
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "2525:1025"
      - "8025:8025"
    networks:
      - microservices-net

  discovery-server:
    build:
      context: ./discovery_service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - microservices-net

  config-server:
    build:
      context: ./config_service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8888:8888"
    depends_on:
      discovery-server:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: native,docker
    networks:
      - microservices-net

  gateway:
    build:
      context: ./gateway_service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8090:8080"
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - microservices-net

  user-service:
    build:
      context: ./user_service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - microservices-net

  notification-service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
      mailhog:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data: